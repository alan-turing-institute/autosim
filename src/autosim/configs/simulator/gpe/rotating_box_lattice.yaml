# Two-phase GPE: imaginary-time ground state → real-time dynamics, vortex lattice regime.
#
# Phase 1 (imaginary_time_steps): converges to the Abrikosov vortex lattice ground state.
#   5000 steps × dt=0.005 = 25 imaginary time units; extra steps needed at high Ω
#   because vortex lattice ordering takes longer to emerge than single-vortex states.
#   Ground state contains O(5–15) vortices in a triangular lattice.
# Phase 2 (T real-time steps): free evolution from the lattice ground state.
#   The lattice rotates rigidly in the lab frame at ≈ Ω; residual noise excites
#   Tkachenko (lattice phonon) modes visible as slow wave-like undulations.
#
# Regime: Ω ∈ [0.55, 0.75] — well above Ω_c, multiple vortices, triangular lattice.
# Above Ω ≈ 0.75 the centrifugal term begins to expel atoms from the trap centre.
#
# References:
#   Abo-Shaeer, J. R., et al. "Observation of vortex lattices in Bose-Einstein condensates."
#   Science 292, 476 (2001). DOI: 10.1126/science.1060182
#   Baym, G. "Tkachenko modes of vortex lattices in rapidly rotating Bose-Einstein condensates."
#   Phys. Rev. Lett. 91, 110402 (2003). DOI: 10.1103/PhysRevLett.91.110402
#   Adhikari, S. K. "Vortex-lattice in a uniform Bose-Einstein condensate in a box trap."
#   J. Phys.: Condens. Matter 31 275401 (2019). DOI: 10.1088/1361-648X/ab14c5
#   Simula, T. et al. "Giant vortex lattice deformations in rapidly rotating Bose-Einstein condensates."
#   Phys. Rev. Lett. 92, 060401 (2004). DOI: 10.1103/PhysRevLett.92.060401
_target_: autosim.experimental.simulations.GrossPitaevskiiEquation2D
return_timeseries: true
log_level: warning
output_names: [density, real, imag]
n: 64
L: 10.0
T: 16.05
dt: 0.005
snapshot_dt: 0.05
skip_nt: 0
random_seed: 42
box_type: woods_saxon
parameters_range:
  wx: [0.0, 0.0]
  wy: [0.0, 0.0]
  box_param: [0.0039, 0.0039]
  ws_a: [0.15, 0.15]
  ws_V0: [200.0, 200.0]
  box_anisotropy: [1.0, 1.15] # High anisotropy squishes the lattice into 1D zig-zags
  width: [1.0, 1.0]
  x0: [0.0, 0.0]
  y0: [0.0, 0.0]
  kx0: [0.0, 0.0]
  ky0: [0.0, 0.0]
  imaginary_time: [0, 0]
  imaginary_time_steps: [8000, 8000]
  imaginary_time_dt: [0.05, 0.05]      # 10x larger learning rate safely allowed!
  initial_noise: [0.05, 0.05]
  g: [100.0, 800.0]
  disorder_strength: [0.0, 0.0]
  disorder_radius: [1.0, 1.0]
  disorder_time_dependent: [0, 0]
  spoon_strength: [0.0, 0.0]
  spoon_speed: [0.0, 0.0]
  spoon_width: [0.18, 0.18]
  spoon_radius: [1.5, 1.5]
  Omega: [0.65, 1.25] # Over 1.0 can expect supersonic rotation and giant vortex rings
