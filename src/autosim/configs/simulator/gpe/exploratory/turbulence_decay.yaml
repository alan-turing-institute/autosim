# Turbulence Decay in a Uniform Box Trap
#
# Simulates free decay of 2D quantum turbulence following vortex injection.
# Phase 1 (The Quench): large initial noise and minimal imaginary-time cooling
#   create a dense initial field of vortices and antivortices.
# Phase 2 (Free Decay): Real-time evolution in a perfectly circular, rigid box 
#   with zero rotation and zero forcing. The conservative GPE physics takes over.
#   Opposite-sign vortices attract and annihilate, emitting sound; like-sign
#   vortices can cluster (inverse-cascade phenomenology) as turbulence decays.
#
# The key open question: does the decay follow classical Kolmogorov scaling, or
# a distinct quantum point-vortex mechanism? This is actively debated.
#
# Emulator advantage: fast surrogate runs support inverse problems and broad
# parameter sweeps for decay-statistics studies.
#
# References:
#   Gauthier, G., et al. "Giant vortex clusters in a two-dimensional quantum fluid."
#     Science 364, 1264-1267 (2019). DOI: 10.1126/science.aat5718
#   Johnstone, S. P., et al. "Evolution of large-scale flow from turbulence in a
#     two-dimensional superfluid." Science 364, 1267-1271 (2019).
#     DOI: 10.1126/science.aat5793
#   Fetter, A. L. "Rotating trapped Bose-Einstein condensates."
#     Rev. Mod. Phys. 81, 647 (2009). DOI: 10.1103/RevModPhys.81.647
_target_: autosim.experimental.simulations.GrossPitaevskiiEquation2D
return_timeseries: true
log_level: warning
output_names: [density, real, imag]
n: 64
L: 10.0
T: 16.05
dt: 0.005
snapshot_dt: 0.05
skip_nt: 0
random_seed: 42
box_type: woods_saxon
parameters_range:
  wx: [0.0, 0.0]
  wy: [0.0, 0.0]
  box_param: [0.003, 0.003]
  ws_a: [0.15, 0.15]
  ws_V0: [200.0, 200.0]
  box_anisotropy: [1.0, 1.0] # Perfectly circular: spinning circle = stationary circle
  width: [3.5, 4.5]
  x0: [0.0, 0.0]
  y0: [0.0, 0.0]
  kx0: [0.0, 0.0]
  ky0: [0.0, 0.0]
  imaginary_time: [0, 0]
  imaginary_time_steps: [0, 3] # Minimal cooling preserves topological defects
  imaginary_time_dt: [0.01, 0.01] # Gentler steps when cooling does occur
  initial_noise: [8.0, 15.0] # Dense phase windings across domain
  g: [200.0, 500.0] # Higher g = smaller healing length = more vortices fit
  disorder_strength: [0.0, 0.0]
  disorder_radius: [1.0, 1.0]
  disorder_time_dependent: [0, 0]
  spoon_strength: [0.0, 0.0] # No external forcing: pure free decay
  spoon_speed: [0.0, 0.0]
  Omega: [0.0, 0.0] # No rotation needed: we want a stationary dipole gas
  exact_trap_rotation: [1, 1]
