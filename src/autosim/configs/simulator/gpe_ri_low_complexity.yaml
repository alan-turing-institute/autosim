## Legacy backup of the original low-complexity GPE real/imag preset.
## Kept for comparison against the newer regime-based configs under simulator/gpe/.
_target_: autosim.experimental.simulations.GrossPitaevskiiEquation2D
return_timeseries: true
log_level: warning
output_names: [density, real, imag]
n: 64
L: 10.0
T: 7.42
dt: 0.005
snapshot_dt: 0.02
skip_nt: 50
random_seed: 42
parameters_range:
  wx: [0.5, 0.5]
  wy: [0.5, 0.5]
  box_param: [0.1, 0.1]
  width: [0.4, 0.8]
  x0: [-1.0, 1.0]
  y0: [-1.0, 1.0]
  kx0: [-2.0, 2.0]
  ky0: [-2.0, 2.0]
  imaginary_time: [0, 0]
  g: [0.0, 0.0]
  disorder_strength: [0.0, 0.0]
  spoon_strength: [0.0, 0.0]
  spoon_speed: [0.0, 0.0]
  Omega: [0.0, 0.0]
