defaults:
  - simulator: shallow_water2d
  - _self_

dataset:
  output_dir: outputs/${now:%Y-%m-%d}/${hydra:runtime.choices.simulator}_${shortuuid:7}
  n_train: 200
  n_valid: 20
  n_test: 20
  ensure_exact_n: true

seed: null
overwrite: false

stratify:
  enabled: false
  key: null
  values: []

visualize:
  enabled: true
  split: train
  batch_indices: [0, 1, 2, 3]
  fps: 5
  file_ext: mp4  # gif (no extra deps) or mp4 (requires ffmpeg)
  overwrite: true
  preserve_aspect: true

normalization:
  # Optional channel groups that should share identical stats in stats.yml.
  # Example: [[real, imag]] or [[density, real, imag]].
  # For GPE (density/real/imag) use --config-name=generate_data_gpe or override:
  #   normalization.shared_core_field_groups='[[density, real, imag]]'
  shared_core_field_groups: []

hydra:
  run:
    dir: ${dataset.output_dir}