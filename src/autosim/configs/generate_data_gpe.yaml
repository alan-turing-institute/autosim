# GPE generation: normalization mean/std computed from real+imag only, then
# the same stats applied to density, real, and imag (for correct phase reconstruction).
# Override simulator if needed: e.g. simulator=gpe_ri_low_complexity or gpe_ri_high_complexity.
defaults:
  - simulator: gross_pitaevskii_equation_2d
  - _self_

dataset:
  output_dir: outputs/${now:%Y-%m-%d}/${hydra:runtime.choices.simulator}_${shortuuid:7}
  n_train: 200
  n_valid: 20
  n_test: 20
  ensure_exact_n: true

seed: null
overwrite: false

stratify:
  enabled: false
  key: null
  values: []

visualize:
  enabled: true
  split: train
  batch_indices: [0, 1, 2, 3]
  fps: 5
  file_ext: mp4  # gif (no extra deps) or mp4 (requires ffmpeg)
  overwrite: true
  preserve_aspect: true

normalization:
  shared_core_field_groups:
    - apply_to: [density, real, imag]
      pool_from: [real, imag]

hydra:
  run:
    dir: ${dataset.output_dir}
